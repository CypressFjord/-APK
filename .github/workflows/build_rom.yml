name: HyperOS Mod & Auto Release (Aria2 & Custom Tools)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'HyperOS ROM 下载链接 (卡刷包 .zip)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Setup System Environment
        env:
          DEBIAN_FRONTEND: noninteractive # 强制关闭所有安装弹窗
        run: |
          echo "=== 安装基础依赖 ==="
          # 使用 -qq 静默更新，避免日志过多卡死页面
          sudo -E apt-get update -qq
          sudo -E apt-get install -yqq openjdk-17-jre-headless aria2 p7zip-full
          
          echo "=== 配置 Apktool ==="
          # 增加 -q 参数静默下载，防止进度条刷屏导致浏览器卡顿
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool apktool.jar
          sudo mv apktool apktool.jar /usr/local/bin/

          echo "=== 赋予自定义 Tools 执行权限 ==="
          # 增加目录存在性判断，防止因找不到 tools 报错中断
          if [ -d "tools" ]; then
            chmod -R +x tools/
            echo "Tools 权限赋予成功！"
          else
            echo "警告: 根目录下未找到 tools 文件夹，请确认是否上传！"
          fi

          echo "=== 赋予自定义 Tools 执行权限 ==="
          # 确保你传到 tools 文件夹里的二进制文件有执行权限
          chmod -R +x tools/

      - name: Download ROM with Aria2
        run: |
          echo "📥 使用 Aria2 多线程下载 ROM..."
          # 强制将下载的文件命名为 rom.zip，避免链接中的杂乱字符导致找不到文件
          aria2c -x16 -s16 -j$(nproc) -U "Mozilla/5.0" -d . "${{ github.event.inputs.rom_url }}" -o rom.zip

      - name: Extract Payload.bin
        run: |
          echo "📦 使用 7z 提取 payload.bin..."
          7z e rom.zip payload.bin > /dev/null
          rm rom.zip # 提取完立刻删除 zip 腾出空间
          
          echo "🛠️ 使用自定义 payload_extract 分解分区..."
          mkdir -p extracted_images
          # 提取需要的三个分区
          ./tools/payload_extract -s -o extracted_images -i payload.bin -X system,product,system_ext -T0
          rm payload.bin # 删除 payload.bin 腾出空间

      - name: Extract EROFS Images
        run: |
          echo "📂 使用自定义 extract.erofs 解包镜像..."
          mkdir -p system_files product_files system_ext_files
          
          echo "-> 解包 system..."
          cd system_files
          sudo ../tools/extract.erofs -i ../extracted_images/system.img -x -s
          cd ..
          
          echo "-> 解包 product..."
          cd product_files
          sudo ../tools/extract.erofs -i ../extracted_images/product.img -x -s
          cd ..
          
          echo "-> 解包 system_ext..."
          cd system_ext_files
          sudo ../tools/extract.erofs -i ../extracted_images/system_ext.img -x -s
          cd ..
          
          # 解包完清理 img 文件
          sudo rm -rf extracted_images

      - name: Run Modification Script
        run: |
          echo "🚀 执行 APK 深度特调修改脚本..."
          chmod +x modify.sh
          ./modify.sh

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload Modded APKs to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "HyperOS 特调 APKs - ${{ steps.tag.outputs.release_tag }}"
          body: |
            ### 自动化特调完成 🚀
            **源 ROM**: ${{ github.event.inputs.rom_url }}
            
            **包含文件**:
            - 🛡️ `MSA_modified.apk` (去广告缓存)
            - 🔋 `MIUISecurityCenter_modified.apk` (解锁详细电池健康度面板)
            - ⚙️ `Settings_modified.apk` (专属关于机型页面 + 7 个状态栏通知图标)
            
            *(提取自 Aria2 + 自定义 Tool 高速构建流)*
          files: output_apks/*.apk
          draft: false
          prerelease: false