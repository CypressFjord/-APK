name: HyperOS Mod & Auto Release (Ultimate)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'HyperOS ROM 下载链接 (卡刷包 .zip)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 【最关键的改动】换用最强力的推土机清理磁盘空间
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup System Environment
        run: |
          echo "=== 1. 强行设置时区防卡死 ==="
          export DEBIAN_FRONTEND=noninteractive
          export TZ=Asia/Shanghai
          sudo ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
          echo $TZ | sudo tee /etc/timezone
          
          echo "=== 2. 安装系统依赖 ==="
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openjdk-17-jre-headless aria2 p7zip-full
          
          echo "=== 3. 赋予本地 Tools 执行权限并配置 Apktool ==="
          if [ -d "tools" ]; then
            chmod -R +x tools/
            # 把你本地传上来的 apktool 移到系统环境变量里
            sudo cp tools/apktool tools/apktool.jar /usr/local/bin/
            echo "Tools 权限赋予及 Apktool 配置成功！"
          else
            echo "错误: 未找到 tools 文件夹！请确保已上传 payload_extract, extract.erofs 和 apktool。"
            exit 1
          fi

      # ---- 下面的步骤不用动，保持你原有的下载和解包逻辑即可 ----
      - name: Download ROM with Aria2
        run: |
          echo "📥 使用 Aria2 多线程下载 ROM..."
          # 强制将下载的文件命名为 rom.zip，避免链接中的杂乱字符导致找不到文件
          aria2c -x16 -s16 -j$(nproc) -U "Mozilla/5.0" -d . "${{ github.event.inputs.rom_url }}" -o rom.zip

      - name: Extract Payload.bin
        run: |
          echo "📦 使用 7z 提取 payload.bin..."
          7z e rom.zip payload.bin > /dev/null
          rm rom.zip # 提取完立刻删除 zip 腾出空间
          
          echo "🛠️ 使用自定义 payload_extract 分解分区..."
          mkdir -p extracted_images
          # 提取需要的三个分区
          ./tools/payload_extract -s -o extracted_images -i payload.bin -X system,product,system_ext -T0
          rm payload.bin # 删除 payload.bin 腾出空间

      - name: Extract EROFS Images
        run: |
          echo "📂 使用自定义 extract.erofs 解包镜像..."
          mkdir -p system_files product_files system_ext_files
          
          echo "-> 解包 system..."
          cd system_files
          sudo ../tools/extract.erofs -i ../extracted_images/system.img -x -s
          cd ..
          
          echo "-> 解包 product..."
          cd product_files
          sudo ../tools/extract.erofs -i ../extracted_images/product.img -x -s
          cd ..
          
          echo "-> 解包 system_ext..."
          cd system_ext_files
          sudo ../tools/extract.erofs -i ../extracted_images/system_ext.img -x -s
          cd ..
          
          # 解包完清理 img 文件
          sudo rm -rf extracted_images

      - name: Run Modification Script
        run: |
          echo "🚀 执行 APK 深度特调修改脚本..."
          chmod +x modify.sh
          ./modify.sh

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload Modded APKs to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "HyperOS 特调 APKs - ${{ steps.tag.outputs.release_tag }}"
          body: |
            ### 自动化特调完成 🚀
            **源 ROM**: ${{ github.event.inputs.rom_url }}
            
            **包含文件**:
            - 🛡️ `MSA_modified.apk` (去广告缓存)
            - 🔋 `MIUISecurityCenter_modified.apk` (解锁详细电池健康度面板)
            - ⚙️ `Settings_modified.apk` (专属关于机型页面 + 7 个状态栏通知图标)
            
            *(提取自 Aria2 + 自定义 Tool 高速构建流)*
          files: output_apks/*.apk
          draft: false
          prerelease: false