name: 🚀 HyperOS Mod & Auto Release (Ultimate)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'HyperOS ROM 下载链接 (卡刷包 .zip)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup Environment
        run: |
          echo "=== 1. 强行设置时区防卡死 ==="
          export DEBIAN_FRONTEND=noninteractive
          export TZ=Asia/Shanghai
          sudo ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
          echo $TZ | sudo tee /etc/timezone
          
          echo "=== 2. 安装系统依赖 ==="
          sudo apt-get update -qq
          sudo apt-get install -yqq openjdk-17-jre-headless aria2 p7zip-full zip
          
          echo "=== 3. 检查并配置本地 Tools ==="
          if [ -d "tools" ]; then
            chmod -R +x tools/
            # 将你本地上传的 apktool 放入系统路径
            sudo cp tools/apktool tools/apktool.jar /usr/local/bin/ 2>/dev/null || true
            echo "✅ Tools 权限赋予及 Apktool 配置成功！"
          else
            echo "❌ 严重错误: 未找到 tools 文件夹！请确认已上传 payload_extract, extract.erofs 和 apktool。"
            exit 1
          fi

      - name: Download ROM with Aria2
        run: |
          echo "📥 使用 Aria2 多线程下载 ROM..."
          aria2c -x16 -s16 -j$(nproc) -U "Mozilla/5.0" -d . "${{ github.event.inputs.rom_url }}" -o rom.zip

      - name: Extract Payload.bin
        run: |
          echo "📦 使用 7z 提取 payload.bin..."
          7z e rom.zip payload.bin > /dev/null
          rm rom.zip
          
          echo "🛠️ 提取 System, Product, System_Ext..."
          mkdir -p extracted_images
          ./tools/payload_extract -s -o extracted_images -i payload.bin -X system,product,system_ext -T0
          rm payload.bin

      - name: Extract EROFS Images
        run: |
          echo "📂 解包 EROFS 镜像..."
          mkdir -p system_files product_files system_ext_files
          
          cd system_files && sudo ../tools/extract.erofs -i ../extracted_images/system.img -x -s && cd ..
          cd product_files && sudo ../tools/extract.erofs -i ../extracted_images/product.img -x -s && cd ..
          cd system_ext_files && sudo ../tools/extract.erofs -i ../extracted_images/system_ext.img -x -s && cd ..
          
          sudo rm -rf extracted_images

      - name: Run Modification Script
        run: |
          echo "🚀 执行 APK 深度特调修改脚本..."
          chmod +x modify.sh
          ./modify.sh

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload Modded APKs to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Modded-APKs-${{ steps.tag.outputs.release_tag }}
          name: "🔥 HyperOS 深度特调 APKs - ${{ steps.tag.outputs.release_tag }}"
          body: |
            ### 自动化特调完成 🚀
            **源 ROM**: ${{ github.event.inputs.rom_url }}
            
            **本次深度注入内容**:
            - 🛡️ `MSA_modified.apk` (完全阻断广告缓存目录创建)
            - 🔋 `MIUISecurityCenter_modified.apk` (解锁完美对齐版详细电池健康度面板)
            - ⚙️ `Settings_modified.apk` (突破 7 个通知图标限制 + 专属关于机型与折叠屏伪装)
            - 🔦 `MIUISystemUIPlugin_modified.apk` (手电筒底层逻辑与 UI 接收器深度替换)
            
            *(构建自 GitHub Actions 自动化流水线)*
          files: output_apks/*.apk
          draft: false
          prerelease: false
